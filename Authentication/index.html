<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click counter</title>
     <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <h1>Click counter</h1>
    <div>
        <p id="intext">Click as fast as you can!</p>
        <button id="starter" >Start</button>
        <p id="Timeteller" class="hidden">Time remaining:</p>
        <button id="counter" class="hidden">Click</button>
        <p id="Scoreteller" class="hidden"> Number of Clicks:0</p>
        <p id="FinalScore" class="hidden"></p>
        <button id="refresh" class="hidden">Refresh</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
